<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to April 23, 2026</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f5f5f5;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            padding: 40px 20px;
            border: 2px solid #ccc;
            border-radius: 12px;
            max-width: 350px;
            width: 90%;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .counter {
            font-size: 3.5rem;
            font-weight: bold;
            color: #2ecc71; /* soft green accent */
            display: inline-block;
            transition: transform 0.3s, color 0.3s;
        }

        /* Animation on update */
        .counter.animate {
            transform: scale(1.3);
            color: #27ae60; /* slightly darker green */
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
            .counter {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Days until April 23, 2026</h1>
        <div class="counter" id="daysCounter">0</div>
    </div>

    <script>
        let lastDays = null;

        function updateCountdown() {
            const targetDate = new Date('2026-04-23T00:00:00');
            const today = new Date();
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const counter = document.getElementById('daysCounter');

            if (diffDays !== lastDays) {
                counter.textContent = diffDays >= 0 ? diffDays : 0;

                // Trigger animation
                counter.classList.add('animate');
                setTimeout(() => {
                    counter.classList.remove('animate');
                }, 300);

                lastDays = diffDays;
            }
        }

        updateCountdown();
        setInterval(updateCountdown, 1000 * 60 * 60); // update hourly
    </script>
</body>
</html>
